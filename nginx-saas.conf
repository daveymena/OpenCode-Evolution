# ============================================
# OpenCode Evolution - Nginx Reverse Proxy
# Multi-tenant SaaS con descarga del instalador
# ============================================

server {
    listen 80;
    server_name _;

    # Tamaño maximo de subida
    client_max_body_size 100M;

    # ==========================================
    # Pagina principal - OpenCode Web UI
    # ==========================================
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ==========================================
    # Descarga del instalador Windows
    # ==========================================
    location /download {
        alias /opt/installer;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment; filename=OpenCode-Evolution-Setup.exe";
        add_header Cache-Control "public, max-age=3600";
    }

    location /download/ {
        alias /opt/installer/;
        default_type application/octet-stream;
        autoindex on;
    }
}

