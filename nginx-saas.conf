# ============================================
# OpenCode Evolution - Nginx Reverse Proxy
# Multi-tenant SaaS + Control Remoto
# ============================================

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 100M;

    # ==========================================
    # Landing page / Centro de Control
    # ==========================================
    location = / {
        root /opt/www;
        index index.html;
    }

    # ==========================================
    # OpenCode Web UI
    # ==========================================
    location /opencode/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ==========================================
    # Puertos de usuarios (SaaS)
    # ==========================================
    location ~ ^/user/(admin|davey|default)(/.*)?$ {
        set $user_port "";
        if ($1 = "admin") { set $user_port "3001"; }
        if ($1 = "davey") { set $user_port "3002"; }
        if ($1 = "default") { set $user_port "3000"; }
        proxy_pass http://127.0.0.1:$user_port$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ==========================================
    # Descarga del instalador Windows
    # ==========================================
    location /download/ {
        alias /opt/installer/;
        autoindex on;
        default_type application/octet-stream;
    }

    location /download {
        alias /opt/installer/OpenCode-Evolution-Setup.exe;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment; filename=OpenCode-Evolution-Setup.exe";
    }

    # ==========================================
    # Servir landing page y assets
    # ==========================================
    location /www/ {
        alias /opt/www/;
    }

    # ==========================================
    # WebSocket proxy para noVNC
    # ==========================================
    location /vnc/ {
        proxy_pass http://127.0.0.1:5900/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}

