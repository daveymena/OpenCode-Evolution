version: "3.9"

services:
  app:
    build: .
    ports:
      - "80:80"
      - "443:443"
      - "3000:3000"
      - "3001-3005:3001-3005"
      - "5900-5905:5900-5905"
      - "9222:9222"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-opencode_evolution_2026}
      - EASYPANEL_URL=${EASYPANEL_URL}
      - INSTALLER_URL=${INSTALLER_URL}
    volumes:
      - opencode_data:/data
      - workspace_data:/workspace
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/users.conf:/etc/opencode/users.conf
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - opencode-network

  db:
    image: postgres:16-alpine
    container_name: opencode-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-6715320}
      POSTGRES_DB: ${DB_NAME:-davey}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opencode-network

volumes:
  opencode_data:
  workspace_data:
  pgdata:

networks:
  opencode-network:
    driver: bridge