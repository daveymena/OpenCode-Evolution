version: "3.9"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - opencode_data:/root/.local/share/opencode
      - workspace_data:/workspace
    restart: unless-stopped

volumes:
  opencode_data:
  workspace_data: